<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pots &amp; Bowls — Acceso</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<style>
  body { margin:0; font-family:'Segoe UI',sans-serif; min-height:100vh; }

  .bg-hero {
    position:fixed; inset:0;
    background:url('login_bg.jpg') center center/cover no-repeat;
  }
  .bg-overlay {
    position:fixed; inset:0;
    background:linear-gradient(135deg, rgba(15,31,24,0.82) 0%, rgba(27,67,50,0.70) 50%, rgba(15,31,24,0.88) 100%);
  }

  .login-card {
    position:relative; z-index:10;
    background:rgba(255,255,255,0.97);
    border-radius:20px;
    padding:2.5rem 2.25rem;
    width:100%; max-width:400px;
    box-shadow:0 24px 60px rgba(0,0,0,0.35);
  }

  .input-field {
    width:100%; border:1.5px solid #d1d5db; border-radius:10px;
    padding:.7rem 1rem; font-size:.95rem; color:#1f2937;
    transition:border-color .2s, box-shadow .2s;
    outline:none; box-sizing:border-box;
  }
  .input-field:focus { border-color:#2d6a4f; box-shadow:0 0 0 3px rgba(45,106,79,.15); }

  .btn-login {
    width:100%; background:#2d6a4f; color:#fff;
    border:none; border-radius:10px; padding:.8rem;
    font-size:1rem; font-weight:700; cursor:pointer;
    transition:background .2s, transform .15s;
  }
  .btn-login:hover { background:#40916c; transform:translateY(-1px); }
  .btn-login:active { transform:translateY(0); }

  .error-msg {
    background:#fee2e2; border:1px solid #fca5a5;
    color:#991b1b; border-radius:8px;
    padding:.6rem .9rem; font-size:.85rem;
    display:none; margin-bottom:1rem;
  }
  .error-msg.show { display:block; }

  .label { font-size:.82rem; font-weight:600; color:#374151; margin-bottom:.35rem; display:block; }

  /* Shake animation on error */
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }
  .shake { animation:shake .4s ease; }

  /* Floating label decoration */
  .field-group { position:relative; }
  .field-icon {
    position:absolute; left:.9rem; top:50%; transform:translateY(-50%);
    color:#9ca3af; font-size:1rem; pointer-events:none;
  }
  .input-field.with-icon { padding-left:2.5rem; }
</style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

<div class="bg-hero"></div>
<div class="bg-overlay"></div>

<div class="login-card" id="loginCard">

  <!-- Logo -->
  <div class="text-center mb-6">
    <img src="pab_company_logo.png" alt="Pots &amp; Bowls"
         style="height:56px; filter:invert(1) sepia(1) saturate(3) hue-rotate(95deg) brightness(.7); margin:0 auto 1rem;"/>
    <h1 class="text-xl font-bold" style="color:#1b4332;">Panel de Inteligencia</h1>
    <p class="text-xs mt-1" style="color:#6b7280;">Acceso restringido · Solo personal autorizado</p>
  </div>

  <!-- Error message -->
  <div class="error-msg" id="errorMsg">
    Usuario, correo o contraseña incorrectos. Intenta de nuevo.
  </div>

  <form onsubmit="handleLogin(event)">

    <div class="mb-4">
      <label class="label" for="userInput">Usuario o correo electrónico</label>
      <div class="field-group">
        <span class="field-icon">👤</span>
        <input type="text" id="userInput" class="input-field with-icon"
               placeholder="admin o tu correo" autocomplete="username" required/>
      </div>
    </div>

    <div class="mb-6">
      <label class="label" for="passInput">Contraseña</label>
      <div class="field-group">
        <span class="field-icon">🔒</span>
        <input type="password" id="passInput" class="input-field with-icon"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>
    </div>

    <button type="submit" class="btn-login" id="loginBtn">Ingresar →</button>

  </form>

  <p class="text-center text-xs mt-5" style="color:#9ca3af;">
    Pots &amp; Bowls · Panel de Inteligencia Competitiva
  </p>

  <!-- AAE Branding -->
  <div style="text-align:center;margin-top:1.2rem;padding-top:1.1rem;border-top:1px solid #e5e7eb;">
    <p style="font-size:.75rem;color:#9ca3af;margin:0 0 .55rem;">Diseñado y creado por:</p>
    <img src="aae_logo.png" alt="AAE" style="height:52px;margin:0 auto .45rem;display:block;filter:brightness(0) opacity(.38);"/>
    <p style="font-size:.88rem;font-weight:600;color:#9ca3af;margin:0;line-height:1.3;">Andrés Acosta Egea</p>
    <p style="font-size:.74rem;color:#9ca3af;margin:.15rem 0 0;">+506 6278-8492 · Sistemas Inteligentes</p>
  </div>

</div>

<script>
// Authorized users — client-side protection for local file use
const USERS = [
  { user: 'admin',                      pass: '12345' },
  { user: 'onlineandres1988@gmail.com', pass: '12345' },
];

// If already logged in, skip to landing
if (sessionStorage.getItem('pb_auth')) {
  window.location.replace('landing.html');
}

function handleLogin(e) {
  e.preventDefault();
  const userVal = document.getElementById('userInput').value.trim().toLowerCase();
  const passVal = document.getElementById('passInput').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errorMsg');
  const card = document.getElementById('loginCard');

  const match = USERS.find(u =>
    u.user.toLowerCase() === userVal && u.pass === passVal
  );

  if (match) {
    btn.textContent = '✓ Acceso concedido…';
    btn.style.background = '#166534';
    sessionStorage.setItem('pb_auth', '1');
    setTimeout(() => window.location.replace('landing.html'), 600);
  } else {
    err.classList.add('show');
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 450);
    document.getElementById('passInput').value = '';
    document.getElementById('passInput').focus();
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.querySelector('form').requestSubmit();
});
</script>

</body>
</html>
